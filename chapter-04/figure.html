<html>
    <head>
    <title>Figure samples</title>
    </head>
    <body>

    <figure>
        <img src="examplearts/images/logo.gif" alt="logo">
        <figcaption>Logo sample</figcaption>
    </figure>

    <figure>
        <pre><code>console.log("Hello");</code></pre>
        <figcaption>Sample JavaScript-code</figcaption>
    </figure>

    <figure>
        <table>
            <tr>
                <th>Product</th>
                <th>Price</th>
            </tr>
            <tr>
                <td>Chair</td>
                <td>100</td>
            </tr>
        </table>
        <figcaption>Price Table</figcaption>
    </figure>

    </body>
</html>
